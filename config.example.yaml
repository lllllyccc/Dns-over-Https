listen: "0.0.0.0:443"
admin_listen: "127.0.0.1:8443"
domain: "dns.example.com"

upstreams:
  - name: "cloudflare"
    address: "1.1.1.1:53"
    protocol: "udp"
    weight: 2
  - name: "google"
    address: "8.8.8.8:53"
    protocol: "udp"
    weight: 1
  - name: "alibaba"
    address: "223.5.5.5:53"
    protocol: "udp"
    weight: 1
  - name: "dnspod"
    address: "119.29.29.29:53"
    protocol: "udp"
    weight: 1
  - name: "cloudflare-doh"
    address: "https://cloudflare-dns.com/dns-query"
    protocol: "doh"
    weight: 0

cache:
  enabled: true
  max_entries: 50000
  default_ttl: 7200

filter:
  enabled: true
  blocklist_path: "./blocklist.txt"

tls:
  email: "admin@example.com"
  cache_dir: "./certs"

admin:
  username: "admin"
  password: "changeme"

logging:
  level: "info"
  query_log: true
  max_log_entries: 10000
