server {
    listen 443 ssl http2;
    server_name doh.lllllyccc.qzz.io;

    ssl_certificate /etc/letsencrypt/live/doh.lllllyccc.qzz.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doh.lllllyccc.qzz.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets on;
    ssl_session_timeout 1d;
    ssl_early_data on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    location /dns-query {
        proxy_pass http://127.0.0.1:8053/dns-query;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_socket_keepalive on;
    }

    location /admin {
        proxy_pass http://127.0.0.1:8054;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_socket_keepalive on;
    }

    location /admin/api/ {
        proxy_pass http://127.0.0.1:8054/admin/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_socket_keepalive on;
    }

    location /health {
        proxy_pass http://127.0.0.1:8053/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /doh.mobileconfig {
        alias /var/www/doh/doh.mobileconfig;
        default_type application/x-apple-aspen-config;
        add_header Content-Disposition "attachment; filename=doh.mobileconfig";
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    server_name doh.lllllyccc.qzz.io;
    return 301 https://$host$request_uri;
}
