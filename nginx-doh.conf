# Nginx reverse proxy for DNS-over-HTTPS
# Place in /etc/nginx/sites-available/doh
# Then: sudo ln -s /etc/nginx/sites-available/doh /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name doh.lllllyccc.qzz.io;

    # TLS certificates (managed by certbot or your existing setup)
    ssl_certificate /etc/letsencrypt/live/doh.lllllyccc.qzz.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doh.lllllyccc.qzz.io/privkey.pem;

    # TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # DoH endpoint
    location /dns-query {
        proxy_pass http://127.0.0.1:8053/dns-query;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for DoH
        proxy_buffering off;
        proxy_request_buffering off;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8053/health;
    }

    # Block everything else
    location / {
        return 404;
    }
}

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name doh.lllllyccc.qzz.io;
    return 301 https://$server_name$request_uri;
}
